# ===========================================
# Vapp API - فقط API (اتصال به SQL روی host)
# استفاده: ./docker/docker-start.sh local
# ===========================================

name: vapp

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: vapp_api_local
    ports:
      - "127.0.0.1:5054:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - DOTNET_RUNNING_IN_CONTAINER=true
      - DatabaseProvider=Docker
      - ConnectionStrings__DockerConnection=Server=host.docker.internal;Database=DbVappLocal;User Id=sa;Password=YourLocalSaPassword;TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true;Max Pool Size=100;Min Pool Size=5;Connection Timeout=30;Pooling=true
      - ConnectionStrings__LocalConnection=Server=host.docker.internal;Database=DbVappLocal;User Id=sa;Password=YourLocalSaPassword;TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true
    volumes:
      - ../wwwroot/uploads:/app/wwwroot/uploads
      - ../log:/app/log
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    command: ["dotnet", "/app/Api_Vapp.dll"]

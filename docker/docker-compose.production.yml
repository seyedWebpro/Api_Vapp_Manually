# ===========================================
# Vapp API - Production Docker Compose
# استفاده: ./docker/docker-start.sh prod
# ===========================================

name: vapp

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU13-ubuntu-22.04
    container_name: vapp_sqlserver_prod
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD:-Vapp@Secure2025!}
      - MSSQL_PID=Developer
      - SA_PASSWORD=${SA_PASSWORD:-Vapp@Secure2025!}
    ports:
      - "127.0.0.1:1433:1433"
    volumes:
      - sqlserver_data_prod:/var/opt/mssql
      - ../backups:/backups
    networks:
      - vapp_network_prod
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -C -Q 'SELECT 1' -b -o /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: vapp-api
    container_name: vapp_api_prod
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "${API_PORT_MAPPING:-127.0.0.1:8080:8080}"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - DOTNET_RUNNING_IN_CONTAINER=true
      - DatabaseProvider=Docker
      - Jwt__Secret=${Jwt__Secret:-}
      - PaymentCallback__GatewayCallbackPublicBaseUrl=${PUBLIC_API_BASE_URL:-http://185.116.162.233}
      - PaymentCallback__SuccessUrl=${PUBLIC_FRONTEND_URL:-http://185.116.162.233}/payment/success
      - PaymentCallback__FailureUrl=${PUBLIC_FRONTEND_URL:-http://185.116.162.233}/payment/failed
      - Frontend__PublicBaseUrl=${PUBLIC_FRONTEND_URL:-http://185.116.162.233}
      # Sms__ApiKey / Sms__SenderNumber: only set in docker/.env when overriding appsettings.json.
      # Do NOT pass empty defaults — ASP.NET Core env vars override appsettings and break OTP/SMS.
      - ConnectionStrings__DockerConnection=Server=sqlserver;Database=DbVapp;User Id=sa;Password=${SA_PASSWORD:-Vapp@Secure2025!};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true;Max Pool Size=100;Min Pool Size=5;Connection Timeout=30;Pooling=true
      - ConnectionStrings__LocalConnection=Server=sqlserver;Database=DbVapp;User Id=sa;Password=${SA_PASSWORD:-Vapp@Secure2025!};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true;Max Pool Size=100;Min Pool Size=5;Connection Timeout=30;Pooling=true
      - SA_PASSWORD=${SA_PASSWORD:-Vapp@Secure2025!}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../wwwroot/uploads:/app/wwwroot/uploads
      - ../log:/app/log
    networks:
      - vapp_network_prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

volumes:
  sqlserver_data_prod:
    driver: local

networks:
  vapp_network_prod:
    driver: bridge
